name: New Assignment

on:
  workflow_dispatch:
    inputs:
      question_url:
        description: '문제 URL (예: https://www.greatfrontend.com/questions/user-interface/image-carousel)'
        required: true
        type: string

jobs:
  create-assignment:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      SUBMISSION_FORUM_CHANNEL_ID: '1502947203805614140'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create new assignment
        env:
          QUESTION_URL: ${{ inputs.question_url }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          DISCORD_WEBHOOK_URL_ASSIGNMENT: ${{ secrets.DISCORD_WEBHOOK_URL_ASSIGNMENT }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: node scripts/new-assignment.mjs

      - name: Create branch, commit and open PR
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="assignment/${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git add .
          git commit -m "chore: 새 과제 추가"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: 새 과제 추가" \
            --body "자동 생성된 과제 PR입니다. 과제 기본 제공코드 추가 및 확인 후 머지해주세요." \
            --base main \
            --head "$BRANCH"
