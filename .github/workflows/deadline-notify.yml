name: Deadline Notification

on:
  schedule: # 스케줄 재등록
    - cron: '0 6 * * 1' # 매주 월요일 15:00 KST (UTC 06:00)
  workflow_dispatch: {} # 수동 실행 버튼

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      SUBMISSION_FORUM_CHANNEL_ID: '1502947203805614140'
      DISCORD_GUILD_ID: '1502923047991115778'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Notify deadline to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node scripts/notify-deadline.mjs

      - name: Close submission post
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: node scripts/close-submission-post.mjs
